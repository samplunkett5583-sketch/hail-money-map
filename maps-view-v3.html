<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HailTrace — Maps View</title>
<style>

/* ── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #90b870;
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ============================================================
   MAPS SHELL — map fills everything, panels float on top
   ============================================================ */
#mapsView {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  overflow: hidden;
}

/* ── Map wrap — Google Maps fills this, no background needed ── */
.ht-map-wrap {
  position: absolute;
  inset: 0;
  z-index: 0;
  background: #e8f0e0; /* fallback while map loads */
}

#stormMap {
  width: 100% !important;
  height: 100% !important;
  position: absolute !important;
  inset: 0 !important;
}

/* Make sure Google Maps canvas and overlays are never clipped */
.ht-map-wrap .gm-style,
.ht-map-wrap .gm-style > * {
  filter: none !important;
  opacity: 1 !important;
}

/* ── Floating UI layer ──────────────────────────────────── */
.ht-ui-layer {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  pointer-events: none; /* let clicks fall through to map by default */
}

.ht-ui-layer > * {
  pointer-events: auto; /* re-enable for actual UI elements */
}

/* ============================================================
   ICON RAIL
   ============================================================ */
#htIconRail {
  position: relative;
  width: 80px;
  min-width: 80px;
  background: transparent;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border-right: 1px solid rgba(255,255,255,0.40);
  padding: 0 0 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  z-index: 20;
  box-shadow: none;
  transition: width 0.28s cubic-bezier(.4,0,.2,1),
              min-width 0.28s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
  flex-shrink: 0;
}

#htIconRail.collapsed {
  width: 60px;
  min-width: 60px;
}

/* Back button / logo — NO background, just the globe floating */
.rail-back-btn {
  width: 100%;
  height: 72px;
  min-height: 72px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 0;
  margin-bottom: 6px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  transition: background 0.18s;
}

.rail-back-btn:hover { background: rgba(255,255,255,0.20); }

.rail-back-icon {
  width: 56px;
  height: 56px;
  border-radius: 0;
  background: none;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.7));
}

.rail-back-icon svg { width: 56px; height: 56px; }

.rail-back-label {
  font-size: 0.57rem;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: rgba(20,80,20,0.70);
  white-space: nowrap;
  transition: opacity 0.18s;
}

#htIconRail.collapsed .rail-back-label { opacity: 0; }

/* Collapse toggle */
.rail-collapse-btn {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  border: 1px solid rgba(148,163,184,0.12);
  background: rgba(148,163,184,0.05);
  color: rgba(20,60,20,0.45);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin: 2px 0 4px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.rail-collapse-btn:hover {
  background: rgba(212,149,46,0.12);
  border-color: rgba(212,149,46,0.35);
  color: #D4952E;
}

.rail-collapse-btn svg {
  width: 12px; height: 12px;
  transition: transform 0.28s cubic-bezier(.4,0,.2,1);
}

#htIconRail.collapsed .rail-collapse-btn svg { transform: rotate(180deg); }

/* Section labels */
.rail-section {
  width: 100%;
  padding: 6px 8px 2px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.rail-section-line {
  flex: 1;
  height: 1px;
  background: rgba(0,0,0,0.10);
}

.rail-section-label {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: rgba(20,60,20,0.40);
  white-space: nowrap;
  overflow: hidden;
  transition: opacity 0.18s, max-width 0.28s;
  max-width: 60px;
}

#htIconRail.collapsed .rail-section-label { opacity: 0; max-width: 0; }

/* Rail buttons */
.ht-rail-btn {
  position: relative;
  width: calc(100% - 12px);
  min-height: 54px;
  border-radius: 12px;
  border: 1px solid transparent;
  background: transparent;
  color: rgba(10,30,10,0.70);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 8px 4px 6px;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  overflow: hidden;
}

.ht-rail-btn svg { width: 22px; height: 22px; flex-shrink: 0; transition: transform 0.15s; }
.ht-rail-btn:hover svg { transform: translateY(-1px); }

.btn-label {
  font-size: 0.59rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: inherit;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
  transition: opacity 0.18s;
}

#htIconRail.collapsed .btn-label { opacity: 0; }

.ht-rail-btn:hover {
  background: rgba(212,149,46,0.09);
  border-color: rgba(212,149,46,0.22);
  color: #D4952E;
}

.ht-rail-btn.active {
  background: rgba(212,149,46,0.16);
  border-color: rgba(212,149,46,0.45);
  color: #F0B050;
}

.ht-rail-btn.active::before {
  content: '';
  position: absolute;
  left: 0; top: 22%; height: 56%; width: 3px;
  border-radius: 0 3px 3px 0;
  background: #D4952E;
  box-shadow: 0 0 8px rgba(212,149,46,0.6);
}

/* Tooltip when collapsed */
.rail-tooltip {
  position: absolute;
  left: calc(100% + 10px);
  top: 50%;
  transform: translateY(-50%);
  background: #1b2a3e;
  color: #e5e7eb;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 8px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  border: 1px solid rgba(212,149,46,0.22);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  z-index: 999;
  transition: opacity 0.12s;
}

#htIconRail.collapsed .ht-rail-btn:hover .rail-tooltip { opacity: 1; }

.rail-spacer { flex: 1; }

/* ============================================================
   LEFT PANEL — floats over map, collapsible
   ============================================================ */
.ht-left-panel {
  position: relative;
  width: 340px;
  min-width: 340px;
  height: 100%;
  display: flex;
  flex-direction: column;
  gap: 0;
  flex-shrink: 0;
  transition: width 0.30s cubic-bezier(.4,0,.2,1),
              min-width 0.30s cubic-bezier(.4,0,.2,1),
              opacity 0.25s;
}

.ht-left-panel.panel-collapsed {
  width: 0;
  min-width: 0;
  opacity: 0;
  pointer-events: none;
}

/* Inner panel card — zero background, map shows straight through */
.ht-panel-card {
  margin: 10px 0 10px 10px;
  border-radius: 16px;
  background: transparent;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border: 1px solid rgba(255,255,255,0.50);
  box-shadow: none;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex: 1;
  min-height: 0;
}

/* Panel header */
.panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.panel-title {
  font-size: 0.82rem;
  font-weight: 700;
  color: #111;
  letter-spacing: 0.01em;
}

.panel-sub {
  font-size: 0.70rem;
  color: rgba(20,40,20,0.60);
  margin-top: 1px;
}

/* Panel collapse handle — tab on right edge */
.panel-collapse-tab {
  position: absolute;
  right: -14px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 48px;
  background: rgba(255,255,255,0.30);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.55);
  border-left: none;
  border-radius: 0 8px 8px 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(20,60,20,0.55);
  transition: background 0.15s, color 0.15s;
  z-index: 5;
}

.panel-collapse-tab:hover {
  background: rgba(212,149,46,0.18);
  color: #D4952E;
}

.panel-collapse-tab svg {
  width: 10px; height: 10px;
  transition: transform 0.28s cubic-bezier(.4,0,.2,1);
}

.ht-left-panel.panel-collapsed + .panel-reopen-btn { opacity: 1; pointer-events: auto; }

/* Reopen button — floats on map when panel closed */
.panel-reopen-btn {
  position: absolute;
  left: 80px; /* rail width */
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 56px;
  background: rgba(255,255,255,0.30);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.55);
  border-left: none;
  border-radius: 0 10px 10px 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(20,60,20,0.55);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, background 0.15s, color 0.15s;
  z-index: 15;
}

.panel-reopen-btn:hover {
  background: rgba(212,149,46,0.18);
  color: #D4952E;
}

.panel-reopen-btn svg { width: 10px; height: 10px; }

/* Address search row */
.maps-address-row {
  padding: 12px 12px 8px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.ht-address-inputwrap {
  position: relative;
  flex: 1;
  min-width: 0;
}

#addressInput {
  width: 100%;
  padding: 9px 32px 9px 12px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.15);
  background: rgba(255,255,255,0.50);
  color: #111;
  font-size: 0.83rem;
  outline: none;
  transition: border-color 0.15s;
}

#addressInput::placeholder { color: rgba(148,163,184,0.38); }
#addressInput:focus { border-color: rgba(212,149,46,0.45); }

.ht-input-x {
  position: absolute;
  top: 50%; right: 9px;
  transform: translateY(-50%);
  width: 17px; height: 17px;
  border-radius: 50%;
  background: rgba(148,163,184,0.14);
  color: rgba(148,163,184,0.55);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  cursor: pointer;
}

.primary-btn {
  padding: 9px 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #D4952E, #8B4A0A);
  color: white;
  font-size: 0.80rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 2px 10px rgba(212,149,46,0.30);
  transition: opacity 0.15s;
}

.primary-btn:hover { opacity: 0.88; }

/* Mini tabs */
.maps-mini-tabs {
  display: flex;
  margin: 0 12px 8px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  flex-shrink: 0;
}

.maps-mini-tabs button {
  flex: 1;
  padding: 8px 4px;
  background: transparent;
  border: none;
  color: rgba(148,163,184,0.50);
  font-size: 0.65rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: background 0.14s, color 0.14s;
}

.maps-mini-tabs button svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.maps-mini-tabs .tab-txt {
  font-size: 0.62rem;
  font-weight: 600;
  line-height: 1;
  letter-spacing: 0.01em;
}

.maps-mini-tabs button + button { border-left: 1px solid rgba(148,163,184,0.09); }

.maps-mini-tabs button.active {
  background: rgba(212,149,46,0.14);
  color: #F0B050;
}

/* Storm controls */
#stormControls {
  padding: 10px 12px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-wrap: wrap;
  flex-shrink: 0;
}

#stormControls label {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 0.68rem;
  font-weight: 600;
  color: rgba(148,163,184,0.50);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

#stormControls select,
#stormControls input {
  padding: 7px 9px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,0.15);
  background: rgba(255,255,255,0.50);
  color: #111;
  font-size: 0.80rem;
  min-width: 130px;
  outline: none;
  transition: border-color 0.15s;
}

#stormControls select:focus,
#stormControls input:focus { border-color: rgba(212,149,46,0.4); }

#stormControls select option { background: #0d1a2a; color: #e5e7eb; }

.pill-btn {
  padding: 7px 12px;
  border-radius: 8px;
  border: 1px solid rgba(212,149,46,0.35);
  background: rgba(212,149,46,0.10);
  color: #D4952E;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.14s;
  white-space: nowrap;
}

.pill-btn:hover { background: rgba(212,149,46,0.20); }
.pill-btn:disabled { opacity: 0.35; cursor: default; }

/* Storm date list panel */
#stormListPanel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
  border-top: 1px solid rgba(0,0,0,0.08);
}

.storm-list-header {
  padding: 10px 14px 6px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-shrink: 0;
}

.storm-list-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: #111;
}

.storm-list-count {
  font-size: 0.68rem;
  color: rgba(20,60,20,0.55);
}

.storm-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.storm-list::-webkit-scrollbar { width: 4px; }
.storm-list::-webkit-scrollbar-track { background: transparent; }
.storm-list::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.18); border-radius: 4px; }

.storm-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 11px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.10);
  background: rgba(255,255,255,0.40);
  color: #111;
  font-size: 0.82rem;
  cursor: pointer;
  transition: background 0.14s, border-color 0.14s;
}

.storm-item:hover {
  background: rgba(212,149,46,0.20);
  border-color: rgba(212,149,46,0.45);
  color: #7a3d00;
}

.storm-item input[type="checkbox"] {
  accent-color: #D4952E;
  width: 15px; height: 15px;
  flex-shrink: 0;
  cursor: pointer;
}

.storm-item-date { flex: 1; font-weight: 600; letter-spacing: 0.02em; color: #111; }

.storm-item-badge {
  font-size: 0.63rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}

.badge-hail {
  background: rgba(37,99,235,0.12);
  color: #1d4ed8;
  border: 1px solid rgba(37,99,235,0.28);
}

.badge-wind {
  background: rgba(5,150,105,0.12);
  color: #065f46;
  border: 1px solid rgba(5,150,105,0.28);
}

/* Paging row */
.storm-paging {
  padding: 8px 12px 10px;
  display: flex;
  gap: 8px;
  align-items: center;
  border-top: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
}

.paging-btn {
  padding: 5px 10px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,0.15);
  background: rgba(255,255,255,0.40);
  color: #222;
  font-size: 0.74rem;
  cursor: pointer;
  transition: background 0.14s, color 0.14s;
}

.paging-btn:hover {
  background: rgba(212,149,46,0.10);
  color: #7a3d00;
  border-color: rgba(212,149,46,0.45);
}

.paging-btn:disabled { opacity: 0.3; cursor: default; }

.paging-info {
  font-size: 0.70rem;
  color: rgba(20,60,20,0.55);
  flex: 1;
  text-align: center;
}

/* ============================================================
   MAP STATUS CHIP — floats top center
   ============================================================ */
.map-status-chip {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,0,0,0.10);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.72rem;
  font-weight: 600;
  color: rgba(10,40,10,0.80);
  letter-spacing: 0.04em;
  white-space: nowrap;
  pointer-events: none;
}

/* ── Field action buttons — NO background, just icon + label ── */
.panel-field-actions {
  display: flex;
  gap: 0;
  padding: 8px 12px 10px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.field-action-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 10px 4px 8px;
  border-radius: 0;
  border: none;
  background: transparent;
  color: #111;
  cursor: pointer;
  transition: opacity 0.15s;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.field-action-btn svg {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  transition: transform 0.15s;
}

.field-action-btn:hover { opacity: 0.7; }
.field-action-btn:hover svg { transform: translateY(-1px); }

/* ── Transparent everything so map shows through ── */
#mapsView,
#mapsView > *,
.ht-maps-shell,
.ht-ui-layer,
.ht-left-panel,
.ht-panel-card,
.panel-header,
#stormListPanel,
.storm-list-header,
.storm-list,
.storm-paging,
.maps-address-row,
#htIconRail,
.rail-section,
.rail-back-btn,
.rail-collapse-btn,
.ht-rail-btn,
.panel-field-actions,
.field-action-btn {
  background: transparent !important;
  background-color: transparent !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  box-shadow: none !important;
}

/* Storm items keep a slight white tint so dates are readable */
.storm-item {
  background: rgba(255,255,255,0.45) !important;
}

.storm-item:hover {
  background: rgba(212,149,46,0.25) !important;
}

/* Address input readable */
#addressInput {
  background: rgba(255,255,255,0.45) !important;
}

/* Paging buttons readable */
.paging-btn {
  background: rgba(255,255,255,0.45) !important;
}

/* Primary Go button keep its color */
.primary-btn {
  background: linear-gradient(135deg, #D4952E, #8B4A0A) !important;
}

/* ── Swath opacity float control ── */
.swath-control {
  position: absolute;
  bottom: 24px;
  right: 24px;
  z-index: 50;
  background: rgba(255,255,255,0.72) !important;
  backdrop-filter: blur(16px) !important;
  -webkit-backdrop-filter: blur(16px) !important;
  border: 1px solid rgba(255,255,255,0.80) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18) !important;
  border-radius: 14px;
  padding: 14px 18px;
  display: none;
  flex-direction: column;
  gap: 10px;
  min-width: 220px;
  pointer-events: auto;
}

.swath-control.visible { display: flex; }

/* ── UI layer must not block map canvas pointer events ── */
.ht-ui-layer {
  pointer-events: none;
}
.ht-ui-layer > * {
  pointer-events: auto;
}

/* ── Make sure Google Maps canvas sits at z-index 0, panels above ── */
.ht-map-wrap { z-index: 0 !important; }
.ht-ui-layer { z-index: 10 !important; }
#htIconRail { z-index: 20 !important; }
.swath-control { z-index: 50 !important; }

</style>
</head>
<body>

<div id="mapsView">

  <!-- ── Real Google Maps fills entire background ── -->
  <div class="ht-map-wrap">
    <div id="stormMap" style="width:100%;height:100%;position:absolute;inset:0;"></div>
  </div>

  <!-- ── Status chip ── -->
  <div class="map-status-chip" id="mapStatusChip">No storm layer loaded</div>

  <!-- ── Floating UI layer ── -->
  <div class="ht-ui-layer">

    <!-- ════════════════════════════════
         ICON RAIL
    ════════════════════════════════ -->
    <div id="htIconRail">

      <!-- Logo = Back Button -->

<script>
(function () {

  const rail = document.getElementById('htIconRail');

  /* ── Rail back button ── */
  document.getElementById('railBackBtn').addEventListener('click', () => {
    if (window.App && window.showOnlyView && App.views && App.views.mainMenuView) {
      showOnlyView(App.views.mainMenuView);
    }
  });

  /* ── Rail collapse button → collapses the entire left panel ── */
  const railCollapseBtn = document.getElementById('railCollapseBtn');
  const panel = document.getElementById('htLeftPanel');
  const collapseTab = document.getElementById('panelCollapseTab');
  const reopenBtn = document.getElementById('panelReopenBtn');

  function setPanelCollapsed(collapsed) {
    panel.classList.toggle('panel-collapsed', collapsed);
    reopenBtn.style.opacity = collapsed ? '1' : '0';
    reopenBtn.style.pointerEvents = collapsed ? 'auto' : 'none';
    // Flip the chevron direction
    railCollapseBtn.style.transform = collapsed ? 'rotate(180deg)' : '';
    localStorage.setItem('htPanelCollapsed', collapsed);
    if (window.App && App.map && window.google && google.maps && google.maps.event) {
      setTimeout(() => google.maps.event.trigger(App.map, 'resize'), 320);
    }
  }

  if (localStorage.getItem('htPanelCollapsed') === 'true') setPanelCollapsed(true);

  // Both the rail chevron AND the panel tab collapse the panel
  railCollapseBtn.addEventListener('click', () => {
    const isCollapsed = panel.classList.contains('panel-collapsed');
    setPanelCollapsed(!isCollapsed);
  });
  collapseTab.addEventListener('click', () => setPanelCollapsed(true));
  reopenBtn.addEventListener('click', () => setPanelCollapsed(false));

  /* ── Rail active state ── */
  rail.querySelectorAll('.ht-rail-btn[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      rail.querySelectorAll('.ht-rail-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  /* ── Swath opacity — click to open, close when slider released ── */
  const swathBtn = document.getElementById('swathBtn');
  const swathControl = document.getElementById('swathControl');
  const swathSlider = document.getElementById('swathSlider');
  const hailSlider = document.getElementById('hailSlider');

  // Click swath button to toggle open
  swathBtn.addEventListener('click', () => {
    swathControl.classList.toggle('visible');
  });

  // Close automatically when user releases either slider
  function closeSwathOnRelease() {
    swathControl.classList.remove('visible');
  }

  swathSlider.addEventListener('mouseup', closeSwathOnRelease);
  swathSlider.addEventListener('pointerup', closeSwathOnRelease);
  swathSlider.addEventListener('touchend', closeSwathOnRelease);
  hailSlider.addEventListener('mouseup', closeSwathOnRelease);
  hailSlider.addEventListener('pointerup', closeSwathOnRelease);
  hailSlider.addEventListener('touchend', closeSwathOnRelease);

  /* ── Swath sliders → apply to real overlays ── */
  swathSlider.addEventListener('input', function () {
    document.getElementById('swathVal').textContent = this.value + '%';
    const opacity = Number(this.value) / 100;
    // Apply to real Google Maps overlays
    (window._lsrOverlays || []).forEach(o => {
      if (o && typeof o.setOptions === 'function') {
        o.setOptions({ fillOpacity: opacity * 0.25, strokeOpacity: opacity });
      }
    });
    if (window.App && App.recentsSwathLayer && typeof App.recentsSwathLayer.setStyle === 'function') {
      App.recentsSwathLayer.setStyle(f => ({
        fillOpacity: opacity * 0.22,
        strokeOpacity: opacity * 0.9,
        strokeWeight: 2,
        fillColor: '#00c2ff',
        strokeColor: '#ffffff'
      }));
    }
    // Also handle swathLayersByDate
    Object.values(window.App && App.swathLayersByDate || {}).forEach(layer => {
      if (layer && typeof layer.setStyle === 'function') {
        layer.setStyle(f => ({
          fillOpacity: opacity * 0.22,
          strokeOpacity: opacity * 0.9,
          strokeWeight: 2
        }));
      }
    });
  });

  hailSlider.addEventListener('input', function () {
    const inches = (this.value / 100 * 4 + 0.25).toFixed(2);
    document.getElementById('hailVal').textContent = inches + '″';
  });

  /* ── Map status chip — update when storm date clicked ── */
  document.querySelectorAll('.storm-item').forEach(item => {
    item.addEventListener('click', () => {
      const date = item.querySelector('.storm-item-date')?.textContent;
      const type = item.querySelector('.storm-item-badge')?.textContent;
      if (date && type) {
        document.getElementById('mapStatusChip').textContent = type + ' layer loaded · ' + date;
      }
    });
  });

})();
</script>
</body>
</html>
