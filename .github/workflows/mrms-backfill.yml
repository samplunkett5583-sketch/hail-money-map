name: MRMS Backfill Swaths

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Backfill 2025-04
        run: node scripts/backfill_mrms_swaths.mjs --month=2025-04

      - name: Backfill 2025-05
        run: node scripts/backfill_mrms_swaths.mjs --month=2025-05

      - name: Backfill 2025-06
        run: node scripts/backfill_mrms_swaths.mjs --month=2025-06

      - name: Backfill 2025-07
        run: node scripts/backfill_mrms_swaths.mjs --month=2025-07

      - name: Backfill 2025-08
        run: node scripts/backfill_mrms_swaths.mjs --month=2025-08

      - name: Backfill 2025-09
        run: node scripts/backfill_mrms_swaths.mjs --month=2025-09

      - name: Backfill 2025-10
        run: node scripts/backfill_mrms_swaths.mjs --month=2025-10

      - name: Backfill 2025-11
        run: node scripts/backfill_mrms_swaths.mjs --month=2025-11

      - name: Backfill 2025-12
        run: node scripts/backfill_mrms_swaths.mjs --month=2025-12

      - name: Backfill 2026-01
        run: node scripts/backfill_mrms_swaths.mjs --month=2026-01

      - name: Backfill 2026-02
        run: node scripts/backfill_mrms_swaths.mjs --month=2026-02

      - name: Backfill 2026-03
        run: node scripts/backfill_mrms_swaths.mjs --month=2026-03

      - name: Backfill 2026-04
        run: node scripts/backfill_mrms_swaths.mjs --month=2026-04
