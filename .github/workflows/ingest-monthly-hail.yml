name: Monthly Hail Ingestion

on:
  # Run daily at 06:00 AM UTC
  schedule:
    - cron: '0 6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      month:
        description: 'Target month (YYYY-MM) or leave empty for previous month'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no data written)'
        required: false
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm install @supabase/supabase-js ngeohash
      
      - name: Run ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NOAA_PROXY_BASE: ${{ secrets.NOAA_PROXY_BASE }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.month }}" ]; then
            ARGS="$ARGS --month=${{ inputs.month }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "NOAA_PROXY_BASE=$NOAA_PROXY_BASE"
          node scripts/ingest-monthly-hail.mjs $ARGS
      
      - name: Report status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Ingestion completed successfully"
          else
            echo "❌ Ingestion failed"
            exit 1
          fi
      
      # Optional: Send notification on failure
      - name: Notify on failure
        if: failure()
        run: |
          echo "Ingestion job failed for month: ${{ inputs.month || 'previous month' }}"
          # Add Slack/email notification here if needed
