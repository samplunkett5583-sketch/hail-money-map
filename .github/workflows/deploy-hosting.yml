name: Deploy Firebase Hosting

# NOTE: Before this workflow will work, you must add the FIREBASE_TOKEN secret
# to your GitHub repository:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: FIREBASE_TOKEN
#   Value: Run `firebase login:ci` locally and paste the output token.

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify FIREBASE_TOKEN secret is set
        run: |
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "❌ FIREBASE_TOKEN secret is not set."
            echo "Go to Settings → Secrets and variables → Actions and add FIREBASE_TOKEN."
            echo "Get the token by running: firebase login:ci"
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --token "$FIREBASE_TOKEN"
