<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Estimates: clipboard with dollar sign -->
  <rect width="100" height="100" rx="18" fill="#FF9F0A"/>
  <!-- Clipboard body -->
  <rect x="22" y="28" width="56" height="58" rx="6" fill="white"/>
  <!-- Clipboard top clip -->
  <rect x="38" y="20" width="24" height="14" rx="5" fill="#FF9F0A"/>
  <rect x="43" y="20" width="14" height="10" rx="3" fill="white"/>
  <!-- Dollar sign -->
  <text x="50" y="72" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="36" fill="#FF9F0A">$</text>
  <!-- Lines suggesting items -->
  <rect x="30" y="42" width="40" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="30" y="52" width="30" height="4" rx="2" fill="#e0e0e0"/>
</svg>
