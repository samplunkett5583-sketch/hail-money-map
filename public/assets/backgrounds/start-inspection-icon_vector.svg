<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Start Inspection: magnifying glass with checkmark -->
  <rect width="100" height="100" rx="18" fill="#5856D6"/>
  <!-- Magnifying glass circle -->
  <circle cx="42" cy="42" r="22" fill="none" stroke="white" stroke-width="7"/>
  <circle cx="42" cy="42" r="14" fill="white" opacity="0.15"/>
  <!-- Handle -->
  <line x1="58" y1="58" x2="78" y2="78" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Checkmark inside glass -->
  <polyline points="32,42 39,50 54,34" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
