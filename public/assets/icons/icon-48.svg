<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="#15345c"/>
  <!-- Map terrain background -->
  <ellipse cx="512" cy="580" rx="430" ry="310" fill="#145892"/>
  <!-- Map grid lines -->
  <g stroke="#1b7ec4" stroke-width="18" opacity="0.45">
    <line x1="82" y1="430" x2="942" y2="430"/>
    <line x1="82" y1="580" x2="942" y2="580"/>
    <line x1="82" y1="730" x2="942" y2="730"/>
    <line x1="250" y1="270" x2="250" y2="890"/>
    <line x1="440" y1="270" x2="440" y2="890"/>
    <line x1="620" y1="270" x2="620" y2="890"/>
    <line x1="800" y1="270" x2="800" y2="890"/>
  </g>
  <!-- Main location pin shape -->
  <path d="M512,180 C380,180 270,290 270,430 C270,610 512,860 512,860 C512,860 754,610 754,430 C754,290 644,180 512,180 Z" fill="#1b7ec4"/>
