  <circle cx="512" cy="415" r="155" fill="#145892"/>
  <!-- Green dollar coin background -->
  <circle cx="512" cy="415" r="120" fill="#589866"/>
  <circle cx="512" cy="415" r="100" fill="#9ad562"/>
  <!-- Dollar sign - vertical bar -->
  <rect x="496" y="335" width="36" height="165" rx="18" fill="#15345c"/>
  <!-- Dollar sign - upper curve (top of S) -->
  <path d="M 456 370 Q 456 338 492 338 L 530 338 Q 562 338 562 370 Q 562 398 530 405 L 490 412 Q 456 419 456 452 Q 456 484 490 484 L 530 484 Q 562 484 562 453" stroke="#15345c" stroke-width="30" fill="none" stroke-linecap="round"/>
  <!-- Green highlight on pin -->
  <ellipse cx="440" cy="310" rx="55" ry="38" fill="#c0eb73" opacity="0.5"/>
  <!-- Hail circles scattered around -->
  <circle cx="210" cy="260" r="46" fill="#fdfe43"/>
  <circle cx="155" cy="410" r="34" fill="#fdfe43"/>
  <circle cx="185" cy="560" r="40" fill="#fdfe43"/>
  <circle cx="815" cy="250" r="42" fill="#fdfe43"/>
  <circle cx="875" cy="400" r="32" fill="#fdfe43"/>
  <circle cx="845" cy="550" r="38" fill="#fdfe43"/>
  <circle cx="360" cy="175" r="28" fill="#fdfe43"/>
